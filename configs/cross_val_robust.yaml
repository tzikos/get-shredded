defaults:
  - default
  - _self_

data:
  mat: data/CYLINDER_ALL.mat
  test_size: 10
  val_size: 20

model:
  num_sensors: 3
  lags: 10
  placement: QR
  hidden_size: 64
  hidden_layers: 2
  l1: 350
  l2: 400
  dropout: 0.0
  d_z: 8

phase1:
  epochs: 1000
  lr: 1.0e-3
  patience: 5

phase2:
  epochs: 500
  lr: 1.0e-3
  patience: 5
  beta_kl: 0.0
  lambda_detect: 0.1

phase3:
  epochs: 200
  lr: 1.0e-3
  patience: 10

augmentation:
  type: burst        # dropout | gaussian | hybrid | burst
  gaussian_std: 0.03
  dropout_fill: 0.0

train:
  batch_size: 64

cross_val:
  n_seeds: 10
  base_seed: 0     # seeds used: base_seed, base_seed+1, ..., base_seed+n_seeds-1

outputs:
  root: outputs/cylinder/cross_val_robust

investigate:
  gap_threshold: 0.05          # min(vanilla_err - robust_err) to call a seed "good"
  noisy_scenario: burst      # scenario used for trust-weight analysis
  seeds: null                  # override with [3,5,7] to specify seeds manually
